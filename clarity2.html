.tabular{font-variant-numeric:tabular-nums}

.card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);padding:16px}

.btn-primary{background:#059669;color:#fff;padding:10px 20px;border-radius:12px;border:none;font-weight:600;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn-primary:hover{background:#047857}
.btn-primary:disabled{background:#A7F3D0;cursor:not-allowed}
.btn-secondary{background:#F1F5F9;color:#0F172A;padding:10px 20px;border-radius:12px;border:1px solid #E2E8F0;font-weight:600;cursor:pointer;font-size:14px}
.btn-danger{background:#FEF2F2;color:#DC2626;padding:10px 20px;border-radius:12px;border:1px solid #FECACA;font-weight:600;cursor:pointer;font-size:14px}
.input-field{width:100%;padding:10px 14px;border:1px solid #E2E8F0;border-radius:12px;font-size:14px;background:#fff;color:#0F172A;transition:border-color .15s}
.input-field:focus{outline:none;border-color:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.1)}

.modal-content h3{font-size:18px;font-weight:700;color:#0F172A;margin-bottom:8px}

.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;font-size:10px;font-weight:500;color:#64748B;border:none;background:none;width:100%}

.nav-item svg{width:20px;height:20px}
.sidebar{width:240px;min-height:100vh;background:#fff;border-right:1px solid #E2E8F0;padding:24px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}

.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:500;color:#64748B;border:none;background:none;width:100%;text-align:left}
.sidebar-item:hover{background:#F1F5F9;color:#0F172A}
.sidebar-item.active{background:#D1FAE5;color:#059669;font-weight:600}
.sidebar-item svg{width:18px;height:18px;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:#F1F5F9;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #E2E8F0;color:#475569;transition:all .15s}
.chip:hover{background:#E2E8F0;color:#0F172A}
.chip.active{background:#D1FAE5;border-color:#059669;color:#065F46;font-weight:600}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid #E2E8F0;margin-bottom:16px;overflow-x:auto}
.tab-item{padding:8px 14px;font-size:13px;font-weight:500;color:#64748B;cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0}
.tab-item.active{color:#059669;border-bottom-color:#059669;font-weight:600}
.disclaimer-box{background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:12px 16px;font-size:12px;color:#92400E;line-height:1.5;margin-bottom:16px}
.disclaimer-box strong{color:#78350F}
.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E8F0;display:none;z-index:50;padding:4px 0 env(safe-area-inset-bottom);justify-content:space-around;box-shadow:0 -2px 10px rgba(0,0,0,.05)}
@media(max-width:768px){

  .mobile-nav{display:flex!important}
  .main-area{padding-bottom:80px}
  .desktop-only{display:none!important}

  .app-layout{display:flex;min-height:100vh}
  .main-area{flex:1;overflow-y:auto}
  .mobile-only{display:none!important}
}
.scroll-hide::-webkit-scrollbar{display:none}
.fab{position:fixed;bottom:90px;right:20px;width:54px;height:54px;border-radius:50%;background:#059669;color:#fff;border:none;font-size:26px;box-shadow:0 4px 14px rgba(5,150,105,.4);cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center}
.empty-state{text-align:center;padding:32px 16px;color:#94A3B8;font-size:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

// ── HELPERS ──
function t(key,lang){return (TRANS[lang]||TRANS['en-US'])[key]||key;}
function catName(cid,lang){const c=CATEGORIES.find(x=>x.id===cid);return c?c.keys[lang]||c.keys['en-US']:cid;}
function expTypeName(tid,lang){const e=EXPENSE_TYPES.find(x=>x.id===tid);return e?e.keys[lang]||e.keys['en-US']:tid;}
function fmt(v,curr){return (curr.symbol||'$')+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function validateEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function validatePhone(p){return /^\+?\d{1,4}[-\s.]?\d{1,4}[-\s.]?\d{1,4}[-\s.]?\d{1,9}$/.test(p.replace(/\s/g,''));}
function parseDate(d){return new Date(d+'T00:00:00');}
function isRetirementCat(cid){const c=CATEGORIES.find(x=>x.id===cid);if(!c)return false;const words=['aposent','retir','jubila','retrait','roth','401k'];return words.some(w=>Object.values(c.keys).join(' ').toLowerCase().includes(w));}
function isTaxCat(cid){return cid==='taxes';}
const DB_KEY='clarity2_db';
function loadDb(){try{const d=localStorage.getItem(DB_KEY);if(d){const p=JSON.parse(d);return{users:[],profiles:{},income:[],expenses:[],budgets:[],goals:[],annualObligations:[],businessDeductions:[],accounts:[],imports:[],userProfiles:{},...p};}}catch(e){}return defaultDb();}
function saveDb(db){localStorage.setItem(DB_KEY,JSON.stringify(db));}
function defaultDb(){return{users:[],profiles:{},income:[],expenses:[],budgets:[],goals:[],annualObligations:[],businessDeductions:[],accounts:[],imports:[],userProfiles:{}};}

function periodDates(period,now){const y=now.getFullYear(),m=now.getMonth();if(period==='month')return{start:new Date(y,m,1),end:new Date(y,m+1,0)};if(period==='quarter'){const q=Math.floor(m/3);return{start:new Date(y,q*3,1),end:new Date(y,q*3+3,0)};}return{start:new Date(y,0,1),end:new Date(y,11,31)};}
function prevPeriod(period,now){const y=now.getFullYear(),m=now.getMonth();if(period==='month'){const d=new Date(y,m-1,1);return{start:new Date(d.getFullYear(),d.getMonth(),1),end:new Date(d.getFullYear(),d.getMonth()+1,0)};}if(period==='quarter'){const q=Math.floor(m/3);if(q===0)return{start:new Date(y-1,9,1),end:new Date(y-1,11,31)};return{start:new Date(y,(q-1)*3,1),end:new Date(y,(q-1)*3+3,0)};}return{start:new Date(y-1,0,1),end:new Date(y-1,11,31)};}
function inPeriod(d,start,end){const dt=parseDate(d);return dt>=start&&dt<=end;}
function avgMonthExpenses(db){const months={};db.expenses.filter(x=>x.tipo==='fixed').forEach(x=>{const m=x.data.slice(0,7);months[m]=(months[m]||0)+Number(x.valor)});const vals=Object.values(months);return vals.length>0?vals.reduce((s,v)=>s+v,0)/vals.length:0;}
function monthName(m,lang){return t(['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'][m],lang);}
function getQuadrant(){const m=new Date().getMonth();return Math.floor(m/3);}

function ConfirmModal({show,title,message,onYes,onCancel,t:tFn}){
  if(!show)return null;
  return createPortal(
    React.createElement('div',{className:'modal-overlay',onClick:onCancel},
      React.createElement('div',{className:'modal-content',onClick:e=>e.stopPropagation()},
        React.createElement('h3',null,title||'Confirm'),
        typeof message==='string'?React.createElement('p',null,message):React.createElement('div',{style:{marginBottom:16}},message),
        React.createElement('div',{style:{display:'flex',gap:12,justifyContent:'flex-end'}},
          React.createElement('button',{className:'btn-secondary',onClick:onCancel},tFn?tFn('cancel'):'Cancel'),
          React.createElement('button',{className:'btn-danger',onClick:onYes},tFn?tFn('yes'):'Yes')
        )
      )
    ),document.body
  );
}

function Toast({message,type,onClose}){
  useEffect(()=>{if(message){const t=setTimeout(onClose,3000);return ()=>clearTimeout(t);}},[message]);
  if(!message)return null;
  return createPortal(
    React.createElement('div',{className:'toast-notif',style:{
      background:type==='error'?'#FEF2F2':type==='success'?'#ECFDF5':'#FFFBEB',
      border:'1px solid '+(type==='error'?'#DC2626':type==='success'?'#059669':'#D97706')
    },onClick:onClose},message),document.body
  );
}

function Disclaimer({t:tFn,lang}){
  return React.createElement('div',{className:'disclaimer-box'},
    React.createElement('strong',null,tFn('disclaimerTitle'),': '),tFn('disclaimer'),
    lang!=='en-US'?React.createElement('div',{style:{marginTop:6,fontSize:11,color:'#B45309',borderTop:'1px solid #FDE68A',paddingTop:6}},
      'English: This app provides general financial and tax information for educational purposes only. It is not personalized financial, tax, legal, or investment advice. Consult a licensed CPA or financial advisor before making decisions or IRS filings.'
    ):null
  );
}

const AuthCtx=createContext(null);

// ── LOGIN SCREEN ──
function LoginScreen({lang,setLang,setToast}){
  const auth=useContext(AuthCtx);
  const [isLogin,setIsLogin]=useState(true);
  const [u,setU]=useState('');const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');const [em,setEm]=useState('');
  const [ph,setPh]=useState('');const [country,setCountry]=useState('US');
  const [currency,setCurr]=useState('USD');
  const [error,setError]=useState('');const [loading,setLoading]=useState(false);
  const isFirst=loadDb().users.length===0;
  const showRegister=!isLogin&&isFirst;

  async function handleSubmit(e){
    e.preventDefault();setError('');setLoading(true);
    try{
      if(isLogin||!isFirst){
        if(!u||!pw){setError(t('required',lang)+' '+t('username',lang));setLoading(false);return;}
        const db=loadDb();const user=db.users.find(x=>x.username===u);
        if(!user){setError(t('loginError',lang));setLoading(false);return;}
        const enc=new TextEncoder();
        const key=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveBits']);
        const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:enc.encode(user.salt),iterations:100000,hash:'SHA-256'},key,256);
        const h=Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
        if(h!==user.hash){setError(t('loginError',lang));setLoading(false);return;}
        user.lastLogin=new Date().toISOString();saveDb(db);
        if(!db.profiles[user.id])db.profiles[user.id]={lang:'en-US',currency:'USD',country:'US',modoAutonomo:false,percentualReservaImposto:27,metaMesesEmergencia:6,limiteAposentadoriaAnual:0,provedorIa:'anthropic'};
        db.profiles[user.id].lang=lang;
        saveDb(db);auth.login(user.id,user.isAdmin||false,user.username);
      } else {
        if(!u||!pw||!pw2||!em||!ph){setError(t('required',lang));setLoading(false);return;}
        if(pw!==pw2){setError(t('passwordsDontMatch',lang));setLoading(false);return;}
        if(pw.length<8){setError(t('passwordHelp',lang));setLoading(false);return;}
        if(!validateEmail(em)){setError(t('invalidEmail',lang));setLoading(false);return;}
        if(!validatePhone(ph)){setError(t('invalidPhone',lang));setLoading(false);return;}
        const db=loadDb();
        if(db.users.find(x=>x.username===u)){setError('Username exists');setLoading(false);return;}
        const salt=crypto.randomUUID();
        const enc=new TextEncoder();
        const key=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveBits']);
        const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:enc.encode(salt),iterations:100000,hash:'SHA-256'},key,256);
        const hash=Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
        const uid=id();
        db.users.push({id:uid,username:u,hash,salt,isAdmin:true,createdAt:new Date().toISOString(),lastLogin:new Date().toISOString()});
